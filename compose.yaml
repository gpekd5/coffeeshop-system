name: coffee-order-system

services:
  mysql:
    image: mysql:8.4
    container_name: coffee-order-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: coffee_order
      MYSQL_USER: coffee
      MYSQL_PASSWORD: coffee
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    container_name: coffee-order-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
