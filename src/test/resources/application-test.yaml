spring:
  datasource:
    url: jdbc:h2:mem:coffee_order_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379

app:
  time-zone: Asia/Seoul
  external-order-event:
    enabled: false
