spring:
  datasource:
    url: jdbc:h2:mem:coffee_order_test_${random.int[100000,999999]};MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 100ms
  kafka:
    bootstrap-servers: localhost:9092

app:
  time-zone: Asia/Seoul
  external-order-event:
    enabled: false
  mock-order-event:
    enabled: true
  kafka-order-event:
    publisher:
      enabled: false
    consumer:
      enabled: false
