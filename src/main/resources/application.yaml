spring:
  application:
    name: coffee-order-system
  profiles:
    default: local
  jackson:
    time-zone: Asia/Seoul
  jpa:
    open-in-view: false

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

app:
  time-zone: Asia/Seoul
  jwt:
    secret: ${APP_JWT_SECRET:local-development-jwt-secret-key-please-change}
    access-token-expires-in-seconds: ${APP_JWT_ACCESS_TOKEN_EXPIRES_IN_SECONDS:1800}
    refresh-token-expires-in-seconds: ${APP_JWT_REFRESH_TOKEN_EXPIRES_IN_SECONDS:1209600}
